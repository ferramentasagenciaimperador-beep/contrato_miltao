<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gerador de Contratos — BASC Advogados</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a; --surface: #111111; --surface2: #1a1a1a;
      --border: #2a2a2a; --gold: #c9a84c; --gold-light: #e8c87a;
      --gold-dim: #8a6f2e; --text: #f0ece4; --text-muted: #888;
      --text-dim: #555; --danger: #c0392b; --radius: 6px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex; align-items: center; justify-content: space-between;
      height: 84px; position: sticky; top: 0; z-index: 100;
    }
    .logo img { height: 68px; width: auto; }
    .header-badge {
      font-family: 'Cormorant Garamond', serif;
      font-size: .95rem; font-weight: 600; letter-spacing: .18em;
      text-transform: uppercase; color: var(--gold-dim);
    }

    .app { display: grid; grid-template-columns: 1fr 1fr; min-height: calc(100vh - 84px); }

    .form-panel { border-right: 1px solid var(--border); overflow-y: auto; max-height: calc(100vh - 84px); }
    .form-inner { padding: 2rem; max-width: 600px; }

    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem; font-weight: 600; color: var(--gold);
      letter-spacing: .08em; text-transform: uppercase;
      margin-bottom: 1.2rem; margin-top: 2rem;
      display: flex; align-items: center; gap: 10px;
    }
    .section-title:first-of-type { margin-top: 0; }
    .section-title::before { content: ''; display: block; width: 3px; height: 18px; background: var(--gold); border-radius: 2px; }

    .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    .field-grid.full { grid-template-columns: 1fr; }
    .field-grid.three { grid-template-columns: 1fr 1fr 1fr; }
    .field { display: flex; flex-direction: column; gap: 6px; }
    label { font-size: .72rem; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; color: var(--text-muted); }
    input, select, textarea {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: .88rem;
      padding: 10px 12px; transition: border-color .15s; outline: none; width: 100%;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--gold-dim);
      box-shadow: 0 0 0 2px rgba(201,168,76,.08);
    }
    input::placeholder, textarea::placeholder { color: var(--text-dim); }
    select option { background: var(--surface2); }
    textarea { resize: vertical; min-height: 80px; }
    .divider { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }

    .services-header { display: grid; grid-template-columns: 1fr 100px 100px 32px; gap: 8px; font-size: .68rem; font-weight: 500; letter-spacing: .08em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 8px; padding: 0 4px; }
    .service-row { display: grid; grid-template-columns: 1fr 100px 100px 32px; gap: 8px; margin-bottom: 8px; align-items: center; }
    .btn-icon { background: none; border: 1px solid var(--border); border-radius: var(--radius); color: var(--text-muted); cursor: pointer; width: 32px; height: 38px; display: flex; align-items: center; justify-content: center; transition: all .15s; font-size: 1rem; }
    .btn-icon:hover { border-color: var(--danger); color: var(--danger); }
    .btn-add { background: none; border: 1px dashed var(--border); border-radius: var(--radius); color: var(--text-muted); cursor: pointer; width: 100%; padding: 10px; font-family: 'DM Sans', sans-serif; font-size: .82rem; transition: all .15s; margin-top: 4px; }
    .btn-add:hover { border-color: var(--gold-dim); color: var(--gold); background: rgba(201,168,76,.04); }

    .total-box { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem; display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; }
    .total-label { font-size: .75rem; text-transform: uppercase; letter-spacing: .08em; color: var(--text-muted); }
    .total-value { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 600; color: var(--gold); }

    .btn-primary { background: var(--gold); color: #0a0a0a; border: none; border-radius: var(--radius); padding: 11px 22px; font-family: 'DM Sans', sans-serif; font-size: .82rem; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; cursor: pointer; transition: background .15s; }
    .btn-primary:hover { background: var(--gold-light); }
    .btn-secondary { background: none; color: var(--text-muted); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 18px; font-family: 'DM Sans', sans-serif; font-size: .82rem; cursor: pointer; transition: all .15s; }
    .btn-secondary:hover { border-color: var(--text-muted); color: var(--text); }
    .form-actions { display: flex; gap: 10px; margin-top: 2rem; }

    .tabs { display: flex; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; }
    .tab { background: none; border: none; border-bottom: 2px solid transparent; color: var(--text-muted); cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: .8rem; font-weight: 500; letter-spacing: .05em; padding: 10px 16px; transition: all .15s; margin-bottom: -1px; text-transform: uppercase; }
    .tab.active { color: var(--gold); border-bottom-color: var(--gold); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* PREVIEW */
    .preview-panel { background: #f5f2ec; overflow-y: auto; max-height: calc(100vh - 84px); }
    .preview-toolbar { background: #e8e4db; border-bottom: 1px solid #d4cfc5; padding: 10px 1.5rem; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .preview-label { font-size: .72rem; font-weight: 500; letter-spacing: .1em; text-transform: uppercase; color: #777; }
    .preview-actions { display: flex; gap: 8px; }
    .btn-preview-action { background: none; border: 1px solid #ccc; border-radius: var(--radius); padding: 6px 14px; font-family: 'DM Sans', sans-serif; font-size: .75rem; font-weight: 500; cursor: pointer; color: #444; transition: all .15s; display: flex; align-items: center; gap: 6px; }
    .btn-preview-action:hover { background: #ddd; }
    .btn-preview-action.primary { background: #0a0a0a; color: #e8c87a; border-color: #0a0a0a; }
    .btn-preview-action.primary:hover { background: #1a1a1a; }

    /* CONTRACT */
    #contract-doc { padding: 3rem 3.5rem; font-family: Georgia, serif; color: #1a1a1a; font-size: .88rem; line-height: 1.8; max-width: 750px; margin: 0 auto; }
    .contract-header { text-align: center; margin-bottom: 2.5rem; padding-bottom: 2rem; border-bottom: 2px solid #8a6f2e; }
    .contract-firm { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 700; letter-spacing: .14em; text-transform: uppercase; color: #8a6f2e; }
    .contract-firm-sub { font-size: .72rem; letter-spacing: .22em; text-transform: uppercase; color: #aaa; margin-top: 4px; }
    .contract-title { font-family: 'Cormorant Garamond', serif; font-size: 1.3rem; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; margin-top: 1.5rem; color: #1a1a1a; }
    .contract-number { font-size: .78rem; color: #888; margin-top: 4px; }
    .contract-section h3 { font-family: Georgia, serif; font-size: .88rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; border-bottom: 1px solid #d8d2c6; padding-bottom: 6px; margin-bottom: 1rem; color: #8a6f2e; margin-top: 2rem; }
    .contract-clause { margin-bottom: .8rem; text-align: justify; }
    .ind { margin-left: 1.5rem; margin-bottom: .5rem; text-align: justify; }
    .parties-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin: 1.5rem 0; }
    .party-block { background: #f0ece4; border: 1px solid #d8d2c6; border-radius: 4px; padding: 1.2rem; }
    .party-label { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .12em; color: #8a6f2e; margin-bottom: 8px; }
    .party-name { font-size: 1rem; font-weight: 700; margin-bottom: 4px; }
    .party-info { font-size: .8rem; color: #555; line-height: 1.6; }
    .services-table { width: 100%; border-collapse: collapse; margin: 1rem 0; font-size: .83rem; }
    .services-table th { background: #2a2118; color: #e8c87a; padding: 8px 12px; text-align: left; font-size: .7rem; letter-spacing: .08em; text-transform: uppercase; }
    .services-table td { padding: 8px 12px; border-bottom: 1px solid #d8d2c6; }
    .services-table tr:nth-child(even) td { background: #f0ece4; }
    .services-table td:last-child, .services-table th:last-child { text-align: right; }
    .services-total-row td { font-weight: 700; border-top: 2px solid #8a6f2e; border-bottom: none; }
    .contract-signatures { margin-top: 4rem; display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; }
    .signature-block { text-align: center; }
    .signature-line { border-top: 1px solid #8a6f2e; padding-top: 8px; font-size: .78rem; color: #444; }
    .contract-date-location { text-align: center; margin: 3rem 0 1rem; font-size: .83rem; color: #555; }
    .contract-footer { text-align: center; margin-top: 3rem; padding-top: 1rem; border-top: 1px solid #d8d2c6; font-size: .7rem; color: #aaa; letter-spacing: .04em; }
    .preview-empty { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; color: #aaa; gap: 12px; font-size: .88rem; }

    #toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(20px); background: #1a1a1a; border: 1px solid var(--gold-dim); color: var(--gold); padding: 10px 20px; border-radius: 40px; font-size: .82rem; opacity: 0; transition: all .3s; z-index: 999; pointer-events: none; }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media(max-width:900px){ .app { grid-template-columns: 1fr; } .field-grid, .field-grid.three { grid-template-columns: 1fr; } .form-panel { max-height: none; } .preview-panel { max-height: 60vh; } }
    @media print { header, .form-panel, .preview-toolbar { display: none !important; } .app { grid-template-columns: 1fr; } .preview-panel { max-height: none; overflow: visible; background: white; } #contract-doc::before { content: "PRÉVIA"; position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%) rotate(45deg); font-size: 9rem; font-weight: 900; color: rgba(0,0,0,.04); pointer-events: none; z-index: 9999; white-space: nowrap; } }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: var(--surface); } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .preview-panel::-webkit-scrollbar-track { background: #e8e4db; } .preview-panel::-webkit-scrollbar-thumb { background: #ccc; }
  </style>
</head>

<div class="app">

  <!-- FORM -->
  <div class="form-panel">
    <div class="form-inner">
      <div class="tabs">
        <button class="tab active" onclick="switchTab(event,'contratante')">Contratante</button>
        <button class="tab" onclick="switchTab(event,'contratada')">Contratada</button>
        <button class="tab" onclick="switchTab(event,'servicos')">Serviços</button>
        <button class="tab" onclick="switchTab(event,'condicoes')">Condições</button>
        <button class="tab" onclick="switchTab(event,'clausulas')">Cláusulas</button>
      </div>

      <!-- CONTRATANTE -->
      <div id="tab-contratante" class="tab-content active">
        <div class="section-title">Dados do Contratante</div>
        <div class="field-grid">
          <div class="field"><label>Tipo de Pessoa</label><select id="tipo-ct" onchange="togglePJ();renderContract()"><option value="PF">Pessoa Física</option><option value="PJ">Pessoa Jurídica</option></select></div>
          <div class="field" id="field-razao" style="display:none"><label>Razão Social</label><input type="text" id="razao-ct" placeholder="Nome da empresa" oninput="renderContract()"/></div>
        </div>
        <div class="field-grid">
          <div class="field"><label id="lbl-nome">Nome Completo</label><input type="text" id="nome-ct" placeholder="Nome do cliente" oninput="renderContract()"/></div>
          <div class="field"><label id="lbl-doc">CPF</label><input type="text" id="doc-ct" placeholder="000.000.000-00" oninput="renderContract()"/></div>
        </div>
        <div class="field-grid" id="field-cnpj" style="display:none">
          <div class="field"><label>CNPJ</label><input type="text" id="cnpj-ct" placeholder="00.000.000/0000-00" oninput="renderContract()"/></div>
          <div class="field"><label>Representante Legal</label><input type="text" id="rep-ct" placeholder="Nome do representante" oninput="renderContract()"/></div>
        </div>
        <div class="field-grid">
          <div class="field"><label>E-mail</label><input type="email" id="email-ct" placeholder="email@exemplo.com" oninput="renderContract()"/></div>
          <div class="field"><label>Telefone</label><input type="text" id="tel-ct" placeholder="(00) 00000-0000" oninput="renderContract()"/></div>
        </div>
        <div class="field-grid full"><div class="field"><label>Endereço Completo</label><input type="text" id="end-ct" placeholder="Rua, número, bairro, cidade — Estado, CEP" oninput="renderContract()"/></div></div>
      </div>

      <!-- CONTRATADA -->
      <div id="tab-contratada" class="tab-content">
        <div class="section-title">Dados do Escritório</div>
        <div class="field-grid">
          <div class="field"><label>Razão Social</label><input type="text" id="razao-cd" value="BASC Advogados" oninput="renderContract()"/></div>
          <div class="field"><label>CNPJ</label><input type="text" id="cnpj-cd" placeholder="00.000.000/0000-00" oninput="renderContract()"/></div>
        </div>
        <div class="field-grid">
          <div class="field"><label>Advogado Responsável</label><input type="text" id="rep-cd" placeholder="Nome do advogado" oninput="renderContract()"/></div>
          <div class="field"><label>OAB</label><input type="text" id="oab-cd" placeholder="ex: OAB/PR 00000" oninput="renderContract()"/></div>
        </div>
        <div class="field-grid">
          <div class="field"><label>E-mail</label><input type="email" id="email-cd" placeholder="contato@bascadvogados.com.br" oninput="renderContract()"/></div>
          <div class="field"><label>Telefone</label><input type="text" id="tel-cd" placeholder="(00) 00000-0000" oninput="renderContract()"/></div>
        </div>
        <div class="field-grid full"><div class="field"><label>Endereço</label><input type="text" id="end-cd" placeholder="Rua, número, sala, cidade — Estado, CEP" oninput="renderContract()"/></div></div>
      </div>

      <!-- SERVIÇOS -->
      <div id="tab-servicos" class="tab-content">
        <div class="section-title">Escopo de Serviços</div>
        <div class="field-grid">
          <div class="field">
            <label>Tipo de Serviço</label>
            <select id="tipo-servico" onchange="renderContract()">
              <option>Consultoria Jurídica</option>
              <option>Assessoria Empresarial</option>
              <option>Representação Judicial</option>
              <option>Elaboração de Contratos</option>
              <option>Planejamento Patrimonial</option>
              <option>Due Diligence</option>
              <option>Compliance Jurídico</option>
              <option>Pacote Jurídico Completo</option>
            </select>
          </div>
          <div class="field"><label>Número do Contrato</label><input type="text" id="num-contrato" placeholder="Ex: BASC-2025-001" oninput="renderContract()"/></div>
        </div>
        <div class="field-grid full"><div class="field"><label>Descrição do Objeto</label><textarea id="objeto" rows="3" placeholder="Descreva o escopo dos serviços jurídicos..." oninput="renderContract()"></textarea></div></div>
        <hr class="divider"/>
        <div class="section-title">Honorários</div>
        <div class="services-header"><span>Descrição</span><span>Qtd</span><span>Valor (R$)</span><span></span></div>
        <div id="services-list"></div>
        <button class="btn-add" onclick="addService()">+ Adicionar Item</button>
        <div class="total-box"><span class="total-label">Total de Honorários</span><span class="total-value" id="total-display">R$ 0,00</span></div>
      </div>

      <!-- CONDIÇÕES -->
      <div id="tab-condicoes" class="tab-content">
        <div class="section-title">Condições Contratuais</div>
        <div class="field-grid">
          <div class="field"><label>Data de Início</label><input type="date" id="data-inicio" oninput="renderContract()"/></div>
          <div class="field"><label>Vigência</label><select id="vigencia" onchange="renderContract()"><option value="1 (um) mês">1 mês</option><option value="3 (três) meses">3 meses</option><option value="6 (seis) meses">6 meses</option><option value="12 (doze) meses" selected>12 meses</option><option value="indeterminada">Indeterminada</option></select></div>
        </div>
        <div class="field-grid three">
          <div class="field"><label>Forma de Pagamento</label><select id="forma-pag" onchange="renderContract()"><option value="PIX/TED">PIX / TED</option><option value="boleto bancário">Boleto</option><option value="cartão de crédito">Cartão</option></select></div>
          <div class="field"><label>Vencimento</label><select id="vencimento" onchange="renderContract()"><option value="todo dia 5">Dia 5</option><option value="todo dia 10">Dia 10</option><option value="todo dia 15">Dia 15</option><option value="todo dia 20">Dia 20</option></select></div>
          <div class="field"><label>Multa por Atraso</label><select id="multa" onchange="renderContract()"><option value="2%">2%</option><option value="5%">5%</option><option value="10%">10%</option></select></div>
        </div>
        <div class="field-grid">
          <div class="field"><label>Cidade</label><input type="text" id="cidade" placeholder="ex: Curitiba" oninput="renderContract()"/></div>
          <div class="field"><label>Estado</label><select id="estado" onchange="renderContract()"><option value="PR" selected>PR</option><option value="SP">SP</option><option value="RJ">RJ</option><option value="MG">MG</option><option value="SC">SC</option><option value="RS">RS</option><option value="BA">BA</option><option value="GO">GO</option><option value="DF">DF</option></select></div>
        </div>
      </div>

      <!-- CLÁUSULAS -->
      <div id="tab-clausulas" class="tab-content">
        <div class="section-title">Cláusulas Adicionais</div>
        <div class="field-grid full"><div class="field"><label>Obrigações do Contratante</label><textarea id="obrig-ct" rows="3" placeholder="Obrigações específicas do cliente..." oninput="renderContract()"></textarea></div></div>
        <div class="field-grid full"><div class="field"><label>Obrigações da Contratada</label><textarea id="obrig-cd" rows="3" placeholder="Obrigações específicas do escritório..." oninput="renderContract()"></textarea></div></div>
        <div class="field-grid full"><div class="field"><label>Confidencialidade</label><textarea id="conf" rows="3" oninput="renderContract()">As partes se comprometem a manter sigilo absoluto sobre todas as informações e documentos trocados durante a vigência deste instrumento, sob pena de responsabilização civil e criminal.</textarea></div></div>
        <div class="field-grid full"><div class="field"><label>Observações Finais</label><textarea id="obs" rows="3" placeholder="Outros termos relevantes..." oninput="renderContract()"></textarea></div></div>
      </div>

      <div class="form-actions">
        <button class="btn-primary" onclick="generateAndScroll()">Gerar Contrato</button>
        <button class="btn-primary" style="background:var(--gold-dim)" onclick="window.print()">⬇ Baixar PDF</button>
        <button class="btn-secondary" onclick="clearForm()">Limpar</button>
      </div>
    </div>
  </div>

  <!-- PREVIEW -->
  <div class="preview-panel" id="preview-panel">
    <div class="preview-toolbar">
      <span class="preview-label">Pré-visualização do Contrato</span>
      <div class="preview-actions">
        <button class="btn-preview-action" onclick="window.print()">🖨 Imprimir</button>
        <button class="btn-preview-action primary" onclick="window.print()">⬇ Baixar PDF</button>
      </div>
    </div>
    <div id="contract-doc">
      <div class="preview-empty">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
        <p>Preencha os dados ao lado para gerar o contrato</p>
      </div>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
let services = [{desc:'',qty:1,value:''}];

document.addEventListener('DOMContentLoaded',()=>{
  renderServices();
  const d = new Date();
  document.getElementById('num-contrato').value = `BASC-${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  document.getElementById('data-inicio').value = d.toISOString().split('T')[0];
  renderContract();
});

function switchTab(e,name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  e.currentTarget.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
}
function togglePJ(){
  const pj = document.getElementById('tipo-ct').value === 'PJ';
  document.getElementById('field-razao').style.display = pj ? '' : 'none';
  document.getElementById('field-cnpj').style.display = pj ? '' : 'none';
  document.getElementById('lbl-nome').textContent = pj ? 'Representante Legal' : 'Nome Completo';
  document.getElementById('lbl-doc').textContent = pj ? 'CPF do Representante' : 'CPF';
}
function renderServices(){
  const c = document.getElementById('services-list'); c.innerHTML='';
  services.forEach((s,i)=>{
    const r = document.createElement('div'); r.className='service-row';
    r.innerHTML=`<input type="text" placeholder="Descrição" value="${s.desc}" oninput="services[${i}].desc=this.value;updateTotal();renderContract()"/>
    <input type="number" min="1" value="${s.qty}" oninput="services[${i}].qty=this.value;updateTotal();renderContract()"/>
    <input type="text" placeholder="0,00" value="${s.value}" oninput="services[${i}].value=this.value;updateTotal();renderContract()"/>
    <button class="btn-icon" onclick="removeService(${i})">×</button>`;
    c.appendChild(r);
  });
  updateTotal(); renderContract();
}
function addService(){ services.push({desc:'',qty:1,value:''}); renderServices(); }
function removeService(i){ if(services.length===1){services[0]={desc:'',qty:1,value:''};renderServices();return;} services.splice(i,1); renderServices(); }
function parseVal(s){ return parseFloat((s||'').replace(/\./g,'').replace(',','.'))||0; }
function fmtBRL(v){ return v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'}); }
function updateTotal(){ let t=0; services.forEach(s=>{t+=parseVal(s.value)*(parseInt(s.qty)||1);}); document.getElementById('total-display').textContent=fmtBRL(t); }
function getTotal(){ let t=0; services.forEach(s=>{t+=parseVal(s.value)*(parseInt(s.qty)||1);}); return t; }
function v(id){ return (document.getElementById(id)||{}).value||''; }
function fmtDate(s){ if(!s)return '___/___/______'; const[y,m,d]=s.split('-'); return `${d}/${m}/${y}`; }

function renderContract(){
  updateTotal();
  const isPJ = v('tipo-ct')==='PJ';
  const nomeCT = isPJ ? (v('razao-ct')||'_______________') : (v('nome-ct')||'_______________');
  const docCT = isPJ ? `CNPJ nº ${v('cnpj-ct')||'______________'}` : `CPF nº ${v('doc-ct')||'_______________'}`;

  let serviceRows=''; let hasServices=false;
  services.forEach(s=>{
    if(!s.desc&&!s.value)return; hasServices=true;
    const qty=parseInt(s.qty)||1, uv=parseVal(s.value);
    serviceRows+=`<tr><td>${s.desc||'—'}</td><td style="text-align:center">${qty}</td><td>${fmtBRL(uv)}</td><td>${fmtBRL(uv*qty)}</td></tr>`;
  });
  if(!hasServices) serviceRows=`<tr><td colspan="4" style="text-align:center;color:#aaa;font-style:italic">Nenhum honorário informado</td></tr>`;

  const html = `
  <div class="contract-header">
    <div class="contract-firm">BASC Advogados</div>
    <div class="contract-firm-sub">Advocacia & Consultoria Jurídica</div>
    <div class="contract-title">Contrato de Prestação de Serviços Advocatícios<br><small style="font-size:.75em;letter-spacing:.05em">${v('tipo-servico')}</small></div>
    <div class="contract-number">Nº ${v('num-contrato')||'BASC-'+new Date().getFullYear()+'-001'} &nbsp;·&nbsp; Emitido em ${fmtDate(new Date().toISOString().split('T')[0])}</div>
  </div>

  <div class="contract-section">
    <h3>Identificação das Partes</h3>
    <div class="parties-grid">
      <div class="party-block">
        <div class="party-label">Contratante</div>
        <div class="party-name">${nomeCT}</div>
        <div class="party-info">${docCT}${v('end-ct')?'<br>'+v('end-ct'):''}${v('email-ct')?'<br>'+v('email-ct'):''}${v('tel-ct')?'<br>'+v('tel-ct'):''}</div>
      </div>
      <div class="party-block">
        <div class="party-label">Contratada</div>
        <div class="party-name">${v('razao-cd')||'BASC Advogados'}</div>
        <div class="party-info">${v('cnpj-cd')?'CNPJ: '+v('cnpj-cd'):''}${v('rep-cd')?'<br>'+v('rep-cd')+(v('oab-cd')?' · '+v('oab-cd'):''):''}${v('end-cd')?'<br>'+v('end-cd'):''}${v('email-cd')?'<br>'+v('email-cd'):''}</div>
      </div>
    </div>
  </div>

  <div class="contract-section">
    <h3>Cláusula 1ª — Objeto</h3>
    <div class="contract-clause">O presente instrumento tem por objeto a prestação de serviços de <b>${v('tipo-servico')}</b> pela CONTRATADA ao CONTRATANTE, nos termos e condições descritos neste instrumento.</div>
    <div class="contract-clause">${v('objeto')||'Os serviços serão prestados com total independência técnica e profissional, conforme as normas da OAB e o Código de Ética e Disciplina da advocacia brasileira.'}</div>
  </div>

  <div class="contract-section">
    <h3>Cláusula 2ª — Honorários Advocatícios</h3>
    <table class="services-table">
      <thead><tr><th>Descrição</th><th style="text-align:center">Qtd</th><th>Valor Unit.</th><th>Subtotal</th></tr></thead>
      <tbody>${serviceRows}</tbody>
      <tfoot><tr class="services-total-row"><td colspan="3"><b>Total de Honorários</b></td><td><b>${fmtBRL(getTotal())}</b></td></tr></tfoot>
    </table>
    <div class="contract-clause">O pagamento deverá ser realizado via <b>${v('forma-pag')}</b>, com vencimento <b>${v('vencimento')}</b>, a partir de <b>${fmtDate(v('data-inicio'))}</b>. Em caso de atraso, incidirá multa de <b>${v('multa')}</b> sobre o valor em aberto, acrescida de juros de 1% ao mês.</div>
  </div>

  <div class="contract-section">
    <h3>Cláusula 3ª — Vigência</h3>
    <div class="contract-clause">O presente contrato terá vigência de <b>${v('vigencia')}</b>, com início em <b>${fmtDate(v('data-inicio'))}</b>. A rescisão antecipada deverá ser comunicada com antecedência mínima de 30 (trinta) dias, por escrito, por qualquer das partes.</div>
  </div>

  ${v('obrig-ct')||v('obrig-cd')||v('conf') ? `
  <div class="contract-section">
    <h3>Cláusula 4ª — Obrigações e Disposições</h3>
    ${v('obrig-ct')?`<div class="contract-clause"><b>Obrigações do Contratante:</b> ${v('obrig-ct')}</div>`:''}
    ${v('obrig-cd')?`<div class="contract-clause"><b>Obrigações da Contratada:</b> ${v('obrig-cd')}</div>`:''}
    ${v('conf')?`<div class="contract-clause"><b>Confidencialidade:</b> ${v('conf')}</div>`:''}
    ${v('obs')?`<div class="contract-clause"><b>Observações:</b> ${v('obs')}</div>`:''}
  </div>` : ''}

  <div class="contract-section">
    <h3>Cláusula 5ª — Foro</h3>
    <div class="contract-clause">As partes elegem o foro da Comarca de <b>${v('cidade')||'____________________'} — ${v('estado')||'___'}</b> para dirimir quaisquer controvérsias oriundas deste instrumento, renunciando a qualquer outro, por mais privilegiado que seja.</div>
  </div>

  <div class="contract-date-location">${v('cidade')||'____________________'}, ${fmtDate(v('data-inicio'))}</div>

  <div class="contract-signatures">
    <div class="signature-block"><div style="height:50px"></div><div class="signature-line"><b>${nomeCT}</b><br>${docCT}<br>CONTRATANTE</div></div>
    <div class="signature-block"><div style="height:50px"></div><div class="signature-line"><b>${v('razao-cd')||'BASC Advogados'}</b>${v('oab-cd')?'<br>'+v('oab-cd'):''}<br>CONTRATADA</div></div>
  </div>

  <div style="margin-top:3rem;border-top:1px solid #d8d2c6;padding-top:1.5rem">
    <p style="text-align:center;font-size:.76rem;color:#888;margin-bottom:1.5rem;letter-spacing:.08em">TESTEMUNHAS</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:3rem">
      <div style="text-align:center"><div class="signature-line">Nome: _____________________<br>CPF: ______________________</div></div>
      <div style="text-align:center"><div class="signature-line">Nome: _____________________<br>CPF: ______________________</div></div>
    </div>
  </div>

  <div class="contract-footer">BASC Advogados — Contrato Nº ${v('num-contrato')||'BASC-'+new Date().getFullYear()+'-001'} — ${new Date().toLocaleDateString('pt-BR')} — PRÉVIA</div>`;

  document.getElementById('contract-doc').innerHTML = html;
}

function generateAndScroll(){ renderContract(); document.getElementById('preview-panel').scrollTo({top:0,behavior:'smooth'}); showToast('Contrato gerado!'); }
function clearForm(){ if(!confirm('Limpar todos os dados?'))return; document.querySelectorAll('input[type=text],input[type=email],input[type=date],textarea').forEach(el=>{ if(!['razao-cd'].includes(el.id)) el.value=''; }); services=[{desc:'',qty:1,value:''}]; renderServices(); renderContract(); showToast('Formulário limpo.'); }
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }
</script>
</body>
</html>
